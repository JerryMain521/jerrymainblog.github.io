<!DOCTYPE html>
<html lang="zh-CN">
    <script>
        (function () {
            try {
                const saved = localStorage.getItem("theme");
                const theme = 
                    saved ||
                    (window.matchMedia("(prefer-color-scheme: dark)").matches
                        ? "dark"
                        : "light");
                document.documentElement.dataset.theme = theme;
            } catch (e) {}
        })();
    </script>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        
        <title>TEMPLATE - JerryMain</title>
        <meta name="description" content="This is the description of this article." />

        <link rel="stylesheet" href="../style.css" />
     
        <!-- For Math Formula Insert -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
        <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false}
                    ]
                });
            });
        </script>
        <!-- For Highlighting -->
        <script src="../highlight.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                hljs.highlightAll();
            });
        </script>
    </head>
    <body class="is-blog">
        <div class="page">
            <!-- For Header Navigation -->
            <header class="site-header">
                <!-- Left Header -->
                <div class="brand">
                    <div class="brand-mark">J</div>
                    <div class="brand-text">
                        <div class="brand-name">JerryMain</div>
                        <div class="brand-tagline">博客 · Blog</div>
                    </div>
                </div>
                <!-- Right Header -->
                <nav class="nav">
                    <a href="../index.html">首页 Home</a>
                    <a href="../blog.html">博客 Blog</a>
                    <button class="theme-toggle" aria-label="切换深色/浅色模式">
                        <span class="theme-icon dark-icon">☀</span>
                        <span class="theme-icon light-icon">☽</span>
                    </button>
                </nav>
            </header>

            <!-- For Article -->
            <main>
                <article class="post-layout post-glass">
                    <!-- Preface -->
                    <header class="post-header">
                        <p class="post-label">Frontend</p>
                        <h1 class="post-title">Frontend Post Template File</h1>
                        <p class="post-meta">JerryMain · 2026.3.10</p>
                    </header>
                    <!-- Body -->
                    <div class="post-content">
                        <p>
                            This post is for template, that means you will find nothing here.
                        </p>
                        
                        <hr class="divider" />
                        
                        <p class="text-muted-sm">That's all for now.</p>
                    </div>
                    <!-- Foot -->
                    <div class="mt-32">
                        <a href="../blog.html" class="post-back-link">← Back to Blog</a>
                    </div>
                </article>
            </main>
            <!-- Page Footer -->
            <footer class="site-footer">
                <span>© <span id="year-footer"></span> JerryMain</span>
                <span class="dot">·</span>
                <span>README</span>
            </footer>
        </div>
        <script src="../main.js"></script>
        <script>
            const y = new Date().getFullYear();
            document.getElementById("year").textContent = y;
            document.getElementById("year-footer").textContent = y;
        </script>
    </body>
</html>
